<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}Alumni Portal{% endblock %}</title>
    <style>
        /* Alert Styling for Django Messages */
        .alert-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #3b82f6; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
        .alert-warning { background: #fffbeb; border: 1px solid #fde68a; color: #d97706; }
        .alert-danger   { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .alert-debug   { background: #f3f4f6; border: 1px solid #d1d5db; color: #374151; }
        .btn-close { opacity: 0.5; }
        .btn-close:hover { opacity: 1; }
    </style>
</head>
<body>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
