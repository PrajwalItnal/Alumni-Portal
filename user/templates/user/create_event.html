{% extends "user/user_base.html" %}

{% block title %}Create Event{% endblock %}

{% block content %}

<style>
    body {
        background: #f5f7fb;
    }

    .event-container {
        max-width: 600px;
        margin: 60px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .event-header h2 {
        margin: 0;
        font-weight: 600;
    }

    .form-control {
        border-radius: 8px;
        padding: 10px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .submit-btn {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        font-weight: 500;
    }
</style>

<div class="event-container">

    <div class="event-header">
        <h2>Create Event</h2>
        <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">Back</a>
    </div>

    <form method="post" enctype="multipart/form-data" action="{% url 'user:event_create' %}">
        {% csrf_token %}

        <div class="form-group">
            <input type="text" name="title" placeholder="Event Title" class="form-control" required>
        </div>

        <div class="form-group">
            <textarea name="description" placeholder="Event Description" class="form-control" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <input type="text" name="event_type" placeholder="Event Type (Workshop, Seminar...)" class="form-control" required>
        </div>

        <div class="form-group">
            <input type="date" name="date" class="form-control" required>
        </div>

        <div class="form-group">
            <input type="time" name="event_time" class="form-control" required>
        </div>

        <div class="form-group">
            <input type="text" name="location" placeholder="Event Location" class="form-control" required>
        </div>

        <div class="form-group">
            <input type="file" name="image" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary submit-btn">
            Create Event
        </button>

    </form>
</div>

{% endblock %}
