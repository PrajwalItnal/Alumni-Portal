{% extends "user/user_base.html" %}

{% block title %}Create Event{% endblock %}

{% block content %}
<h1>Create Event</h1>
<button onclick="window.history.back()">Back</button>
<form method="post" enctype="multipart/form-data", action="{% url 'user:event_create' %}">
    {% csrf_token %}
    <div class="form-group">
        <label for="id_title">Title:</label>
        <input type="text" name="title" id="id_title" class="form-control" required><br>
        <label for="id_description">Description:</label>
        <textarea name="description" id="id_description" class="form-control" required></textarea><br>
        <label for="id_event_type">Event Type:</label>
        <input type="text" name="event_type" id="id_event_type" class="form-control" required><br>
        <label for="id_date">Date:</label>
        <input type="date" name="date" id="id_date" class="form-control" required><br>
        <label for="id_event_time">Time:</label>
        <input type="time" name="event_time" id="id_event_time" class="form-control" required><br>
        <label for="id_location">Location:</label>
        <input type="text" name="location" id="id_location" class="form-control" required><br>
        <label for="id_image">Image:</label>
        <input type="file" name="image" id="id_image" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Create Event</button><br>
</form>
{% endblock %}
