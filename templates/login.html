{% extends "base.html" %}

{% block title %}Login | Alumni Portal{% endblock %}

{% block content %}
<div class="section" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
  <div class="card" style="width: 100%; max-width: 450px; padding: 3rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div class="nav-logo" style="margin: 0 auto 1.5rem; width: 60px; height: 60px; font-size: 30px;">🎓</div>
      <h2 class="text-gradient" style="font-size: 2.2rem;">Welcome Back</h2>
      <p>Login to access your Alumni Portal dashboard</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="section-label" style="background: var(--secondary-glow); color: var(--secondary); display: block; width: 100%; margin-bottom: 1.5rem; text-align: center;">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}

      <div style="margin-bottom: 1.5rem;">
        <label class="section-label">Register ID</label>
        <input type="text" name="register_id" placeholder="Enter your Register ID" required />
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label class="section-label">Password</label>
        <input type="password" name="password" placeholder="Enter your password" required />
      </div>

      <div style="display: flex; justify-content: flex-end; margin-bottom: 2rem;">
        <a href="{% url 'reset_password' %}" class="action-btn" style="font-size: 0.9rem;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
    </form>
  </div>
</div>
{% endblock %}
