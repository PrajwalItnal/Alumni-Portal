<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .wrap { width: 100%; max-width: 420px; }

  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; }
  h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem; }

  .card {
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 1.8rem;
    margin-bottom: 1.2rem;
  }

  .form-group { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #999;
    margin-bottom: 0.4rem;
  }

  input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: #111;
    outline: none;
    background: #fafafa;
  }

  input:focus { border-color: #3b82f6; background: #fff; }

  button {
    width: 100%;
    padding: 0.85rem;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.5rem;
  }

  button:hover { background: #2563eb; }

  .msg { color: #16a34a; font-size: 0.88rem; margin-bottom: 1rem; }
</style>
</head>

<body>
<div class="wrap">

  <h1>Forgot Password</h1>

  {% if messages %}
    {% for message in messages %}
      <p class="msg">{{ message }}</p>
    {% endfor %}
  {% endif %}

  <div class="card">
    <h2>Enter Register ID</h2>
    <form action="{% url 'send_otp' %}" method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Register ID</label>
        <input type="text" name="register_id" required>
      </div>
      <button type="submit">Send OTP</button>
    </form>
  </div>

  {% if request.session.otp %}
  <div class="card">
    <h2>Enter OTP & New Password</h2>
    <form action="{% url 'reset_password' %}" method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>OTP</label>
        <input type="text" name="otp" maxlength="6" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" minlength="6" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>
      </div>
      <button type="submit">Reset Password</button>
    </form>
  </div>
  {% endif %}

</div>
</body>
</html>
