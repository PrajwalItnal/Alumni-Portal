{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Alumni Portal{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/modern.css' %}">
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="{% url 'home' %}">
      <div class="nav-logo"><div class="logo-inner">🎓</div></div>
      <span class="nav-brand-text">Smart Alumni Connect</span>
    </a>
    <ul class="nav-links">
      <li><a href="{% url 'home' %}">Home</a></li>
      <li><a href="{% url 'about' %}">About</a></li>
      <li><a href="{% url 'contact' %}">Contact</a></li>
      <li><a href="{% url 'login' %}" class="nav-cta">Login</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    {% block content %}
    {% endblock %}
  </div>

  <footer>
    © 2026 <span>Smart Alumni Connect Portal</span> | All Rights Reserved
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.section').forEach(section => {
        observer.observe(section);
      });
    });
  </script>

</body>
</html>
