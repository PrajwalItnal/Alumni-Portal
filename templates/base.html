{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Alumni Portal{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #ffffff;
      color: #111111;
      line-height: 1.6;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      color: #111;
      line-height: 1.2;
    }

    p { color: #555; font-size: 0.95rem; line-height: 1.75; }
    a { color: #3b82f6; text-decoration: none; }
    a:hover { color: #111; }
    li { font-size: 0.9rem; color: #555; margin-bottom: 0.4rem; }

    input, textarea, select {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #f9f9f9;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      color: #111;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #3b82f6;
      background: #fff;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.8rem;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { padding: 0.9rem 1rem; text-align: left; font-size: 0.78rem; font-weight: 600; color: #999; text-transform: uppercase; border-bottom: 1px solid #e5e5e5; }
    td { padding: 0.9rem 1rem; color: #444; border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #fafafa; }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 3rem;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      text-decoration: none;
    }

    .nav-logo {
      width: 36px; height: 36px;
      background: #3b82f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-brand-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #111;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #555;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .nav-links a:hover { color: #111; }

    .nav-cta {
      background: #3b82f6 !important;
      color: #fff !important;
      padding: 0.5rem 1.3rem !important;
      border-radius: 8px !important;
    }

    /* Buttons */
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-secondary { background: #f5f5f5; color: #111; border: 1px solid #e5e5e5; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-sm { padding: 0.45rem 1rem; font-size: 0.82rem; }
    .btn-lg { padding: 1rem 2.2rem; font-size: 1rem; }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 1.8rem;
    }

    /* Badges */
    .badge { display: inline-flex; align-items: center; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
    .badge-blue   { background: #eff6ff; color: #3b82f6; }
    .badge-green  { background: #f0fdf4; color: #16a34a; }
    .badge-red    { background: #fef2f2; color: #dc2626; }
    .badge-gold   { background: #fffbeb; color: #d97706; }
    .badge-purple { background: #f5f3ff; color: #7c3aed; }

    /* Alerts */
    .alert { padding: 0.85rem 1.1rem; border-radius: 10px; font-size: 0.88rem; margin-bottom: 1rem; }
    .alert-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #3b82f6; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
    .alert-warning { background: #fffbeb; border: 1px solid #fde68a; color: #d97706; }
    .alert-error   { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }

    /* Form */
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.2rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }

    /* Layout */
    .page-wrapper { padding-top: 70px; min-height: 100vh; }
    .section { padding: 4rem 3rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }

    /* Grids */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #e5e5e5;
      color: #aaa;
      font-size: 0.82rem;
    }
    footer span { color: #3b82f6; }

    /* Responsive */
    @media (max-width: 900px) {
      .navbar { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .section { padding: 3rem 1.5rem; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-brand" href="#">
      <div class="nav-logo">🎓</div>
      <span class="nav-brand-text">Smart Alumni Connect</span>
    </a>
    <ul class="nav-links">
      <li><a href="{% url 'home' %}">Home</a></li>
      <li><a href="{% url 'about' %}">About</a></li>
      <li><a href="{% url 'contact' %}">Contact</a></li>
      <li><a href="{% url 'login' %}" class="nav-cta">Login</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    {% block content %}
    {% endblock %}
  </div>

  <footer>
    © 2026 <span>Smart Alumni Connect Portal</span> | All Rights Reserved
  </footer>

</body>
</html>
